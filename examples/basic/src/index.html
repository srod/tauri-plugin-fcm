<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FCM Example</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 1.5rem;
        background: #0f0f0f;
        color: #e0e0e0;
        min-height: 100vh;
      }
      h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
      p.desc { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      button {
        padding: 0.5rem 1rem;
        border: 1px solid #333;
        border-radius: 6px;
        background: #1a1a1a;
        color: #e0e0e0;
        font-size: 0.85rem;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover { background: #2a2a2a; }
      button:active { background: #333; }
      button.danger { border-color: #633; }
      button.danger:hover { background: #331a1a; }
      button.secondary { border-color: #444; color: #888; }
      #output {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 1rem;
        font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
        font-size: 0.8rem;
        line-height: 1.5;
        min-height: 300px;
        max-height: 60vh;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>tauri-plugin-fcm</h1>
    <p class="desc">Example app — 5 commands + 2 event listeners</p>

    <div class="actions">
      <button type="button" id="btn-check">Check Permissions</button>
      <button type="button" id="btn-request">Request Permission</button>
      <button type="button" id="btn-register">Register</button>
      <button type="button" id="btn-token">Get Token</button>
      <button type="button" id="btn-delete" class="danger">Delete Token</button>
      <button type="button" id="btn-clear" class="secondary">Clear Log</button>
    </div>

    <pre id="output"></pre>

    <script type="module" src="main.ts"></script>
  </body>
</html>
